<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Saya</title>
    <style>
        /* Mengatur dasar desain (Reset & Font) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Kartu Portofolio */
        .portfolio-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .portfolio-card:hover {
            transform: translateY(-5px);
        }

        /* Bagian Header/SAMPUL */
        .card-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px 20px;
            color: white;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #ffffff;
            margin: 0 auto 15px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .card-header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .card-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Bagian Konten/Isi Data */
        .card-body {
            padding: 30px 25px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            border-left: 4px solid #667eea;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .icon {
            font-size: 1.5rem;
            margin-right: 15px;
        }

        .info-text label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .info-text p {
            font-size: 0.95rem;
            color: #334155;
            font-weight: 600;
        }

        /* Bagian Footer */
        .card-footer {
            padding: 20px;
            background: #f1f5f9;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="portfolio-card">
        <div class="card-header">
            <div class="avatar">👤</div>
            <h1>Nama Lengkap Anda</h1>
            <p>Pelajar / Mahasiswa</p>
        </div>

        <div class="card-body">
            
            <div class="info-item">
                <div class="icon">🆔</div>
                <div class="info-text">
                    <label>Nama Lengkap</label>
                    <p>Nama Lengkap Anda</p>
                </div>
            </div>

            <div class="info-item">
                <div class="icon">📅</div>
                <div class="info-text">
                    <label>Tempat, Tanggal Lahir</label>
                    <p>Jakarta, 17 Agustus 2005</p>
                </div>
            </div>

            <div class="info-item">
                <div class="icon">🏫</div>
                <div class="info-text">
                    <label>Tempat Sekolah</label>
                    <p>SMA Negeri 1 Jakarta</p>
                </div>
            </div>

        </div>

        <div class="card-footer">
            © 2026 Portofolio Digital Saya
        </div>
    </div>

</body>
</html>
